---
# Secret for Event Hub Connection String
# This should be created separately with your actual Event Hub connection string
apiVersion: v1
kind: Secret
metadata:
  name: fabric-event-hub-connection
  namespace: azure-iot-operations
type: Opaque
stringData:
  # Replace with your actual Event Hub connection string from Fabric
  # Format: Endpoint=sb://...EventHubName=...SharedAccessKeyName=...SharedAccessKey=...
  connection: "Endpoint=sb://<namespace>.servicebus.windows.net/;SharedAccessKeyName=<key-name>;SharedAccessKey=<key-value>;EntityPath=<event-hub-name>"

---
# Monitor Data Flow Status
# kubectl get dataflow -n azure-iot-operations -o wide
# kubectl describe dataflow mqtt-to-fabric -n azure-iot-operations
# kubectl logs -n azure-iot-operations -l app=data-flow-runtime
