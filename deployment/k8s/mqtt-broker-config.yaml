# MQTT Broker Configuration for Azure IoT Operations
# Based on Step 8: MQTT Broker Configuration
# This file contains the BrokerListener configuration for external access

apiVersion: mqttoperator.io/v1alpha1
kind: BrokerListener
metadata:
  name: loadbalancer-listener
  namespace: azure-iot-operations
spec:
  brokerRef: default
  serviceType: LoadBalancer
  ports:
    # Port 1883: Unencrypted MQTT (for testing only)
    - port: 1883
      protocol: MQTT
      authentication: none
      authorization: none
      
    # Port 8883: Encrypted MQTT with mTLS (production)
    - port: 8883
      protocol: MQTT
      authentication: default
      authorization: none
      tls:
        mode: Automatic
        issuerName: azure-iot-operations-aio-certificate-issuer
        issuerKind: ClusterIssuer
        issuerGroup: cert-manager.io
        keyAlgorithm: Ec256
        keyRotationPolicy: Always
        duration: 2160h  # 90 days
        renewBefore: 720h  # 30 days before expiration

---
# MQTT Broker configuration
apiVersion: mqttoperator.io/v1alpha1
kind: Broker
metadata:
  name: default
  namespace: azure-iot-operations
spec:
  # Memory and CPU limits
  resources:
    limits:
      memory: "1Gi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "100m"
  
  # Enable diagnostics
  diagnostics:
    enabled: true
    logLevel: info
  
  # Session management
  sessionsPersistenceSettings:
    enabled: true
    sessionDataMaxSize: "10Mi"
  
  # Message retention
  inMemoryRetainedMessages:
    enabled: true
    maxRetainedMessages: 10000
  
  # Authentication backend (default: no authentication)
  # To enable authentication, configure authenticationBackendSettings
  # authenticationBackendSettings:
  #   authenticationMethod: basic
  #   keyvaultRef: <key-vault-name>

---
# Example: Data Flow Source - subscribes to MQTT topics
apiVersion: brokerlistener.mqttoperator.io/v1alpha1
kind: DataFlowEndpoint
metadata:
  name: mqtt-broker-endpoint
  namespace: azure-iot-operations
spec:
  protocol: mqtt
  brokerRef: default
  
  # Internal MQTT broker endpoint configuration
  connection:
    # Use cluster-internal service name
    host: "aio-mq-dmqtt-frontend"
    port: 1883
  
  # Topic subscriptions
  topics:
    - "sensors/+"
    - "devices/+"
    - "wms/inventory"
  
  authentication:
    type: none
